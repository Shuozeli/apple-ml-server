repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/dense-crate/llvm-utils
    rev: v1.0.1
    hooks:
      - id: swift-format
        args: [--check, --recursive, --parallel]
        files: ^server/

  - repo: https://github.com/rust-lang/rustfmt
    rev: v1.0.0
    hooks:
      - id: rustfmt
        args: [--all, --]
        types: rust

  - repo: https://github.com/ericwa/clippy-check
    rev: v1.0.0
    hooks:
      - id: clippy
        args: [--all, --, -D, warnings]
        types: rust